<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}New Central Portal{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23f97316' d='M12 1.5l9.1 5.25v10.5L12 22.5l-9.1-5.25V6.75z'/%3E%3Cpath fill='none' stroke='white' stroke-width='1.6' stroke-linecap='round' d='M8.1 14.2a5.5 5.5 0 017.8 0M12 17h.01M5.6 11.4c3.5-3.5 9.3-3.5 12.8 0'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif']
            },
            colors: {
              'brand': { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
              'surface': { 950: '#060a14', 900: '#0d1117', 800: '#161b27', 700: '#1e2535', 600: '#2a3347' }
            }
          }
        }
      }
    </script>
    <style>
      :root { color-scheme: dark; }

      /* ── Base / typography ─────────────────────────────────────────── */
      body {
        background:
          radial-gradient(1000px 620px at 88% -12%, rgba(249,115,22,.055), transparent 60%),
          radial-gradient(900px 650px at -12% 108%, rgba(34,211,238,.045), transparent 60%),
          #060a14;
        background-attachment: fixed;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-feature-settings: 'cv02','cv03','cv04','cv11';
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      [x-cloak] { display: none !important; }

      /* ── Thin themed scrollbars ────────────────────────────────────── */
      * { scrollbar-width: thin; scrollbar-color: #1e2535 transparent; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 8px; }
      ::-webkit-scrollbar-thumb:hover { background: #2a3347; }

      /* ── Sidebar navigation ────────────────────────────────────────── */
      .nav-link { display:flex; align-items:center; gap:10px; margin:1px 8px; padding:7px 10px; border-radius:8px; border-left:2px solid transparent; color:#8b96ab; font-size:.82rem; font-weight:500; transition:all .15s ease; text-decoration:none; }
      .nav-link svg { opacity:.7; flex-shrink:0; transition:opacity .15s ease; }
      .nav-link:hover { background:#141a28; color:#e2e8f0; }
      .nav-link:hover svg { opacity:1; }
      .nav-link.active { background:rgba(249,115,22,.09); color:#fb923c; border-left:2px solid #f97316; }
      .nav-link.active svg { opacity:1; }
      .nav-section { font-size:.62rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#475569; padding:18px 20px 6px; }

      /* ── Cards ─────────────────────────────────────────────────────── */
      .card { background:linear-gradient(180deg, #161b27 0%, #10141f 100%); border:1px solid #1e2535; border-radius:12px; padding:20px; box-shadow:0 1px 2px rgba(0,0,0,.35), 0 12px 32px -18px rgba(0,0,0,.6); transition:border-color .15s ease; }
      .card:hover { border-color:#283149; }
      .stat-card { background:linear-gradient(180deg, #161b27 0%, #10141f 100%); border:1px solid #1e2535; border-radius:12px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,.35), 0 12px 32px -18px rgba(0,0,0,.6); transition:border-color .15s ease; }
      .stat-card:hover { border-color:#283149; }

      /* ── Status badges (pill + dot) ────────────────────────────────── */
      .status-badge-online { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:9999px; font-size:.7rem; font-weight:600; background:rgba(34,197,94,.1); color:#4ade80; box-shadow:inset 0 0 0 1px rgba(34,197,94,.3); }
      .status-badge-offline { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:9999px; font-size:.7rem; font-weight:600; background:rgba(239,68,68,.1); color:#f87171; box-shadow:inset 0 0 0 1px rgba(239,68,68,.3); }

      /* ── Page header / section labels ──────────────────────────────── */
      .page-header { border-bottom:1px solid #1e2535; padding-bottom:18px; margin-bottom:24px; }
      .section-label { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#64748b; }

      /* ── Tables ────────────────────────────────────────────────────── */
      table.tbl { width:100%; border-collapse:collapse; }
      .tbl thead th { padding:10px 16px; text-align:left; font-size:.65rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#64748b; background:rgba(13,17,23,.85); border-bottom:1px solid #1e2535; white-space:nowrap; }
      .tbl thead th.sortable { cursor:pointer; user-select:none; }
      .tbl thead th.sortable:hover { color:#94a3b8; }
      .tbl tbody td { padding:11px 16px; font-size:.84rem; color:#94a3b8; }
      .tbl-row { border-bottom:1px solid rgba(30,37,53,.6); transition:background .15s ease; cursor:pointer; }
      .tbl-row:last-child { border-bottom:none; }
      .tbl-row:hover { background:rgba(30,37,53,.45); }

      /* ── Buttons ───────────────────────────────────────────────────── */
      .btn-primary { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:7px 16px; border:none; border-radius:8px; background:#f97316; color:#fff; font-size:.78rem; font-weight:600; cursor:pointer; transition:all .15s ease; box-shadow:0 1px 2px rgba(0,0,0,.4), 0 4px 14px -6px rgba(249,115,22,.55); white-space:nowrap; }
      .btn-primary:hover { background:#ea580c; }
      .btn-primary:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }
      .btn-secondary { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:7px 14px; border:1px solid #2a3347; border-radius:8px; background:#161b27; color:#94a3b8; font-size:.78rem; font-weight:500; cursor:pointer; transition:all .15s ease; white-space:nowrap; }
      .btn-secondary:hover { border-color:#3b465e; color:#e2e8f0; background:#1a2030; }
      .btn-secondary:disabled { opacity:.5; cursor:not-allowed; }

      /* ── Inputs / selects ──────────────────────────────────────────── */
      .input, .select { width:100%; padding:8px 12px; background:#0d1117; border:1px solid #1e2535; border-radius:8px; color:#e2e8f0; font-size:.84rem; outline:none; transition:border-color .15s ease, box-shadow .15s ease; }
      .input::placeholder { color:#4b5563; }
      .input:focus, .select:focus { border-color:#f97316; box-shadow:0 0 0 3px rgba(249,115,22,.14); }
      .select { cursor:pointer; }

      /* ── Tabs (filter bars above tables) ───────────────────────────── */
      .tabs { display:flex; align-items:stretch; border-bottom:1px solid #1e2535; }
      .tab-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 0; font-size:.82rem; font-weight:600; background:none; border:none; cursor:pointer; transition:color .15s ease; white-space:nowrap; color:#6b7280; }
      .tab-sep { width:1px; background:#1e2535; margin:8px 20px; }
      .tab-count { padding:2px 8px; border-radius:20px; font-size:.68rem; font-weight:700; line-height:1.4; }

      /* ── Empty states ──────────────────────────────────────────────── */
      .empty-state { display:flex; flex-direction:column; align-items:center; gap:10px; padding:48px 20px; text-align:center; color:#64748b; font-size:.85rem; }
      .empty-state svg { color:#334155; }

      /* ── HTMX loading indicators ───────────────────────────────────── */
      .htmx-indicator { display:none; }
      .htmx-request .htmx-indicator, .htmx-indicator.htmx-request { display:inline-block; }
      .spinner { width:14px; height:14px; border:2px solid rgba(249,115,22,.25); border-top-color:#f97316; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
      @keyframes spin { to { transform:rotate(360deg); } }

      /* ── Accessibility: visible focus rings (brand orange) ─────────── */
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
      textarea:focus-visible, summary:focus-visible, [tabindex]:focus-visible {
        outline: 2px solid #f97316;
        outline-offset: 2px;
        border-radius: 4px;
      }
      .input:focus-visible, .select:focus-visible { outline-offset: 0; }

      /* ── Accessibility: respect reduced-motion preference ──────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: .01ms !important;
          scroll-behavior: auto !important;
        }
        .animate-ping, .animate-pulse { display: none !important; }
      }

      /* ── Toast (HTMX error feedback) ───────────────────────────────── */
      #toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 8px; max-width: calc(100vw - 2rem); }
      .toast { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; background: linear-gradient(180deg, #1c1117 0%, #150d12 100%); border: 1px solid rgba(239,68,68,.4); color: #fca5a5; font-size: .8rem; font-weight: 500; box-shadow: 0 8px 28px -10px rgba(0,0,0,.7); }
      .toast button { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 2px 4px; font-size: .9rem; line-height: 1; border-radius: 4px; }
      .toast button:hover { color: #e2e8f0; }
    </style>
</head>
<body class="text-slate-300 min-h-screen"
      x-data="{ sidebarOpen: false }"
      @keydown.escape.window="sidebarOpen = false">
<div class="flex h-screen overflow-hidden">

    <!-- Mobile off-canvas backdrop -->
    <div x-show="sidebarOpen" x-cloak
         x-transition.opacity.duration.150ms
         @click="sidebarOpen = false"
         class="fixed inset-0 z-40 bg-black/60 md:hidden"
         aria-hidden="true"></div>

    <!-- Sidebar -->
    <aside id="app-sidebar"
           class="w-56 flex-shrink-0 bg-surface-900/80 backdrop-blur border-r border-surface-700 flex flex-col overflow-y-auto fixed inset-y-0 left-0 z-50 transform transition-transform duration-200 ease-in-out -translate-x-full md:translate-x-0 md:static md:z-auto"
           :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
           aria-label="Sidebar">
        <!-- Logo -->
        <div class="px-4 py-4 border-b border-surface-700 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
                 style="background:linear-gradient(135deg,#fb923c 0%,#ea580c 100%);box-shadow:0 0 16px rgba(249,115,22,.35);">
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
            </div>
            <div class="min-w-0 flex-1">
                <p class="text-sm font-semibold text-white leading-tight tracking-tight">HPE Networking</p>
                <p class="text-[11px] text-slate-500 tracking-wide">Central Portal</p>
            </div>
            <button type="button" class="md:hidden p-1.5 text-slate-400 hover:text-white"
                    @click="sidebarOpen = false" aria-label="Close navigation menu">
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <nav class="flex-1 py-2" aria-label="Primary"
             @click="if ($event.target.closest('a')) sidebarOpen = false">
            <div class="nav-section">Central</div>
            <a href="/" class="nav-link {% if active == 'home' %}active{% endif %}" {% if active == 'home' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a>
            <a href="/devices/" class="nav-link {% if active == 'devices' %}active{% endif %}" {% if active == 'devices' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path stroke-linecap="round" d="M8 21h8M12 17v4"/></svg>
                Devices
            </a>
            <a href="/clients/" class="nav-link {% if active == 'clients' %}active{% endif %}" {% if active == 'clients' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path stroke-linecap="round" d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                Clients
            </a>
            <a href="/topology/" class="nav-link {% if active == 'topology' %}active{% endif %}" {% if active == 'topology' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path stroke-linecap="round" d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
                Topology
            </a>
            <a href="/sites/" class="nav-link {% if active == 'sites' %}active{% endif %}" {% if active == 'sites' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
                Sites
            </a>

            <div class="nav-section">GreenLake</div>
            <a href="/lab/greenlake" class="nav-link {% if active == 'greenlake' %}active{% endif %}" {% if active == 'greenlake' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-4.9-6H7a4 4 0 00-4 4z"/></svg>
                GreenLake
            </a>
            <a href="/notifications/" class="nav-link {% if active == 'notifications' %}active{% endif %}" {% if active == 'notifications' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                Notifications
            </a>

            <div class="nav-section">Playground</div>
            <a href="/lab/" class="nav-link {% if active == 'lab' %}active{% endif %}" {% if active == 'lab' %}aria-current="page"{% endif %}>
                <svg aria-hidden="true" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
                Lab
            </a>
        </nav>

        <div class="px-4 py-3 border-t border-surface-700">
            <div class="flex items-center gap-2">
                <span class="relative flex w-2 h-2 flex-shrink-0" aria-hidden="true">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-40"></span>
                    <span class="relative inline-flex rounded-full w-2 h-2 bg-green-400"></span>
                </span>
                <span class="text-[11px] text-slate-500 truncate tracking-wide">Aruba Central &middot; Connected</span>
            </div>
        </div>
    </aside>

    <!-- Main column (mobile top bar + content) -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

        <!-- Mobile top bar -->
        <header class="md:hidden flex items-center gap-3 px-4 py-2.5 bg-surface-900/80 backdrop-blur border-b border-surface-700 flex-shrink-0">
            <button type="button"
                    @click="sidebarOpen = true"
                    class="p-2 -ml-1 rounded-lg text-slate-300 hover:text-white hover:bg-surface-700/60"
                    aria-label="Open navigation menu"
                    aria-controls="app-sidebar"
                    :aria-expanded="sidebarOpen ? 'true' : 'false'">
                <svg aria-hidden="true" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0"
                 style="background:linear-gradient(135deg,#fb923c 0%,#ea580c 100%);box-shadow:0 0 12px rgba(249,115,22,.35);">
                <svg aria-hidden="true" width="14" height="14" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
            </div>
            <p class="text-sm font-semibold text-white tracking-tight truncate">HPE Networking <span class="text-slate-500 font-normal">&middot; Central Portal</span></p>
        </header>

        <!-- Main -->
        <main class="flex-1 overflow-y-auto">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
                {% block content %}{% endblock %}
            </div>
        </main>

    </div>

</div>

<!-- Toast notifications (HTMX / network error feedback) -->
<div id="toast-container" role="status" aria-live="polite"></div>
<script>
  (function () {
    function showToast(message) {
      var container = document.getElementById('toast-container');
      if (!container) return;
      var toast = document.createElement('div');
      toast.className = 'toast';
      var text = document.createElement('span');
      text.textContent = message;
      var close = document.createElement('button');
      close.type = 'button';
      close.setAttribute('aria-label', 'Dismiss notification');
      close.innerHTML = '&times;';
      close.addEventListener('click', function () { toast.remove(); });
      toast.appendChild(text);
      toast.appendChild(close);
      container.appendChild(toast);
      setTimeout(function () { toast.remove(); }, 6000);
    }
    window.showToast = showToast;
    document.body.addEventListener('htmx:responseError', function (evt) {
      var status = evt.detail && evt.detail.xhr ? evt.detail.xhr.status : '';
      showToast('Request failed' + (status ? ' (' + status + ')' : ''));
    });
    document.body.addEventListener('htmx:sendError', function () {
      showToast('Request failed (network error)');
    });
  })();
</script>
</body>
</html>
