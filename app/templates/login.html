<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — New Central Portal</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23f97316' d='M12 1.5l9.1 5.25v10.5L12 22.5l-9.1-5.25V6.75z'/%3E%3Cpath fill='none' stroke='white' stroke-width='1.6' stroke-linecap='round' d='M8.1 14.2a5.5 5.5 0 017.8 0M12 17h.01M5.6 11.4c3.5-3.5 9.3-3.5 12.8 0'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      /* Standalone page — intentionally does not extend base.html (no sidebar,
         no Tailwind CDN). Styles below mirror the app theme. */
      :root { color-scheme: dark; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background:
          radial-gradient(1000px 620px at 88% -12%, rgba(249,115,22,.055), transparent 60%),
          radial-gradient(900px 650px at -12% 108%, rgba(34,211,238,.045), transparent 60%),
          #060a14;
        background-attachment: fixed;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-feature-settings: 'cv02','cv03','cv04','cv11';
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        color: #cbd5e1;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .login-card {
        width: 100%;
        max-width: 380px;
        background: linear-gradient(180deg, #161b27 0%, #10141f 100%);
        border: 1px solid #1e2535;
        border-radius: 12px;
        padding: 32px 28px 28px;
        box-shadow: 0 1px 2px rgba(0,0,0,.35), 0 12px 32px -18px rgba(0,0,0,.6);
      }

      .logo-row { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 26px; text-align: center; }
      .logo-mark {
        width: 44px; height: 44px; border-radius: 12px;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #fb923c 0%, #ea580c 100%);
        box-shadow: 0 0 22px rgba(249,115,22,.35);
      }
      .brand-eyebrow { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #64748b; }
      h1 { font-size: 1.15rem; font-weight: 700; color: #fff; letter-spacing: -.01em; margin-top: 2px; }
      .subtitle { font-size: .78rem; color: #64748b; margin-top: 4px; }

      label { display: block; font-size: .72rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #94a3b8; margin-bottom: 7px; }

      /* Mirrors .input from base.html */
      .input-style {
        width: 100%; padding: 9px 12px;
        background: #0d1117; border: 1px solid #1e2535; border-radius: 8px;
        color: #e2e8f0; font-size: .9rem; font-family: inherit; outline: none;
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      .input-style::placeholder { color: #4b5563; }
      .input-style:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.14); }

      /* Mirrors .btn-primary from base.html */
      .btn-primary-style {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        width: 100%; margin-top: 16px; padding: 9px 16px;
        border: none; border-radius: 8px;
        background: #f97316; color: #fff;
        font-size: .82rem; font-weight: 600; font-family: inherit;
        cursor: pointer; transition: all .15s ease;
        box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 14px -6px rgba(249,115,22,.55);
        white-space: nowrap;
      }
      .btn-primary-style:hover { background: #ea580c; }

      a:focus-visible, button:focus-visible, input:focus-visible {
        outline: 2px solid #f97316; outline-offset: 2px; border-radius: 4px;
      }
      .input-style:focus-visible { outline-offset: 0; }

      .error-box {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 16px; padding: 9px 12px;
        background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.35);
        border-radius: 8px; color: #fca5a5; font-size: .8rem; font-weight: 500;
        animation: shake .4s ease;
      }
      .error-box svg { flex-shrink: 0; }
      @keyframes shake {
        10%, 90% { transform: translateX(-1px); }
        20%, 80% { transform: translateX(2px); }
        30%, 50%, 70% { transform: translateX(-3px); }
        40%, 60% { transform: translateX(3px); }
      }

      .foot-note { margin-top: 18px; text-align: center; font-size: .7rem; color: #475569; }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: .01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="logo-row">
            <div class="logo-mark">
                <svg aria-hidden="true" width="20" height="20" fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/></svg>
            </div>
            <div>
                <p class="brand-eyebrow">HPE Networking</p>
                <h1>Central Portal</h1>
                <p class="subtitle">Sign in to continue</p>
            </div>
        </div>

        {% if error %}
        <div class="error-box" role="alert">
            <svg aria-hidden="true" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <label for="password">Password</label>
            <input id="password" name="password" type="password"
                   class="input-style" autofocus required
                   autocomplete="current-password"
                   placeholder="Portal password">
            <button type="submit" class="btn-primary-style">
                <svg aria-hidden="true" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path stroke-linecap="round" d="M7 11V7a5 5 0 0110 0v4"/></svg>
                Sign in
            </button>
        </form>

        <p class="foot-note">New Central Portal &middot; Network operations &amp; tooling</p>
    </main>
</body>
</html>
