<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 &mdash; Something went wrong</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23f97316' d='M12 1.5l9.1 5.25v10.5L12 22.5l-9.1-5.25V6.75z'/%3E%3C/svg%3E">
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background:
          radial-gradient(1000px 620px at 88% -12%, rgba(249,115,22,.055), transparent 60%),
          radial-gradient(900px 650px at -12% 108%, rgba(34,211,238,.045), transparent 60%),
          #060a14;
        background-attachment: fixed;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #94a3b8;
      }
      .card {
        background: linear-gradient(180deg, #161b27 0%, #10141f 100%);
        border: 1px solid #1e2535;
        border-radius: 12px;
        padding: 48px 40px;
        box-shadow: 0 1px 2px rgba(0,0,0,.35), 0 12px 32px -18px rgba(0,0,0,.6);
        max-width: 440px;
        width: 100%;
        text-align: center;
      }
      .code {
        font-size: 4.75rem;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -.03em;
        color: #475569;
      }
      .code .accent { color: #f97316; }
      .rule {
        width: 48px; height: 3px; border: none; border-radius: 2px;
        background: #f97316; margin: 18px auto 20px; opacity: .85;
      }
      h1 { font-size: 1.05rem; font-weight: 600; color: #f1f5f9; margin-bottom: 8px; }
      .msg { font-size: .84rem; line-height: 1.6; color: #64748b; margin-bottom: 28px; }
      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        padding: 9px 20px; border: none; border-radius: 8px;
        background: #f97316; color: #fff; font-size: .8rem; font-weight: 600;
        text-decoration: none; transition: background .15s ease;
        box-shadow: 0 1px 2px rgba(0,0,0,.4), 0 4px 14px -6px rgba(249,115,22,.55);
      }
      .btn:hover { background: #ea580c; }
      .btn:focus-visible { outline: 2px solid #f97316; outline-offset: 2px; }
    </style>
</head>
<body>
    <main class="card">
        <p class="code" aria-hidden="true">5<span class="accent">0</span>0</p>
        <hr class="rule">
        <h1>Something went wrong</h1>
        <p class="msg">{{ detail if detail else "An unexpected error occurred on our side. It has been logged — please try again in a moment." }}</p>
        <a class="btn" href="/">&larr;&nbsp; Back to dashboard</a>
    </main>
</body>
</html>
