{% extends "base.html" %}
{% block title %}API Lookup - Lab - New Central Portal{% endblock %}
{% block content %}
<div class="page-header">
    <div class="flex items-center gap-2 text-xs text-slate-500 mb-2">
        <a href="/lab/" class="hover:text-brand-400 transition-colors">Lab</a>
        <span class="text-slate-700">/</span>
        <span class="text-slate-400">API Lookup</span>
    </div>
    <h1 class="text-2xl font-bold text-white">OpenAPI Lookup</h1>
    <p class="text-sm text-slate-500 mt-0.5">Exact field, enum, endpoint, and schema answers from the centralmcp specs index</p>
</div>

<div class="max-w-4xl">
    <div class="card mb-6">
        <form hx-post="/lab/doc-api" hx-target="#search-results" hx-indicator="#api-spinner" hx-disabled-elt="#api-btn" class="flex gap-2">
            <input type="text" name="query" required autocomplete="off"
                   placeholder="e.g. wlan ssid auth-type enum values"
                   class="input flex-1">
            <button type="submit" id="api-btn" class="btn-primary px-5">
                <span>Lookup</span>
                <span id="api-spinner" class="htmx-indicator"><span class="spinner"></span></span>
            </button>
        </form>
    </div>
    <div id="search-results">
        <div class="card">
            <div class="empty-state">
                <p>Ask about an API field, endpoint, or enum value</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
