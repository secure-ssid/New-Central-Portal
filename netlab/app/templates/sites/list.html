{% extends "base.html" %}
{% block title %}Sites - New Central Portal{% endblock %}
{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-white mb-2">Sites</h1>
    <p class="text-gray-400">Physical locations</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for site in sites %}
    <a href="#" class="card hover:border-brand-500 transition-colors">
        <h3 class="text-lg font-semibold text-white mb-2">{{ site.name }}</h3>
        <div class="flex justify-between text-sm">
            <span class="text-gray-400">{{ site.devices }} devices</span>
            <span class="text-gray-400">{{ site.clients }} clients</span>
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
