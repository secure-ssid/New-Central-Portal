<div class="card">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-white">Execution Result</h2>
        <span class="text-xs px-2 py-1 rounded
            {% if result.status == 'success' %}bg-green-500/20 text-green-400 border border-green-500/30{% else %}bg-red-500/20 text-red-400 border border-red-500/30{% endif %}">
            {{ result.status|upper }}
        </span>
    </div>

    <div class="space-y-3">
        <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Tool</p>
            <p class="font-mono text-sm text-white">{{ result.tool }}</p>
        </div>

        {% if result.params %}
        <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Parameters</p>
            <pre class="p-3 bg-surface-900 rounded-lg overflow-x-auto"><code class="text-xs text-gray-300">{{ result.params | tojson(indent=2) }}</code></pre>
        </div>
        {% endif %}

        {% if result.error %}
        <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Error</p>
            <p class="text-sm text-red-400 font-mono">{{ result.error }}</p>
        </div>
        {% endif %}

        <div>
            <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">Response</p>
            <pre class="p-3 bg-surface-900 rounded-lg overflow-x-auto max-h-96"><code class="text-xs text-gray-300" id="mcp-response-json">{{ result.output | tojson(indent=2) }}</code></pre>
        </div>
    </div>

    <div class="mt-4 pt-4 border-t border-surface-700 flex gap-2 text-xs">
        <button onclick="navigator.clipboard.writeText(document.getElementById('mcp-response-json').innerText)"
                class="px-3 py-1.5 bg-surface-900 text-gray-400 rounded hover:text-white transition-colors">
            📋 Copy Response
        </button>
    </div>
</div>
