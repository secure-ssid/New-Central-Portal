{% extends "base.html" %}
{% block title %}Lab - New Central Portal{% endblock %}
{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-white mb-2">Lab</h1>
    <p class="text-gray-400">Experiments, demos, and learning. Stuff that's allowed to be half-broken.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    {% for exp in experiments %}
    <a href="/lab/{{ exp.slug }}" class="card hover:border-brand-500 transition-colors group">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-2 h-2 rounded-full
                {% if exp.color == 'green' %}bg-green-500
                {% elif exp.color == 'blue' %}bg-blue-500
                {% elif exp.color == 'purple' %}bg-purple-500
                {% elif exp.color == 'amber' %}bg-amber-500
                {% elif exp.color == 'teal' %}bg-teal-500
                {% else %}bg-gray-500{% endif %}"></div>
            <h3 class="text-base font-semibold text-white group-hover:text-brand-500">{{ exp.name }}</h3>
            <span class="ml-auto text-xs text-gray-600 uppercase">{{ exp.status }}</span>
        </div>
        <p class="text-sm text-gray-400">{{ exp.desc }}</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
